<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 火焰即時監控面板</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0d0d11;
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }
    .container {
      max-width: 480px;
      margin: 20px auto;
      background: #181824;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border: 1px solid #2a2a3d;
      position: relative;
    }
    h1 { font-size: 22px; margin-bottom: 15px; color: #ff9800; }
    
    .config-box {
      background: #222233;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: left;
      font-size: 14px;
    }
    .config-box input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #181824;
      color: #fff;
    }

    .flame-container {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 15px 0;
      border-radius: 12px;
      background: #09090d;
    }
    .flame-box {
      font-size: 16px;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
      transform-origin: center center;
    }
    .flame-safe {
      filter: grayscale(100%);
      opacity: 0.2;
      transform: scale(0.1) !important;
    }
    .flame-active {
      filter: drop-shadow(0 0 25px #ff3d00);
      animation: burn 0.2s infinite alternate ease-in-out;
    }
    @keyframes burn {
      0% { transform: rotate(-5deg); }
      100% { transform: rotate(5deg); }
    }

    .status-badge {
      font-size: 18px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 25px;
      display: inline-block;
      margin-bottom: 15px;
    }
    .badge-safe { background: #1b5e20; color: #81c784; }
    .badge-danger { 
      background: #c62828; 
      color: #ffffff; 
      animation: pulse 0.6s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .data-card {
      background: #222233;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
      text-align: left;
    }
    .bar-bg {
      background: #333;
      height: 14px;
      border-radius: 7px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
      transition: width 0.15s ease;
    }

    .reset-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background: #393954;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .reset-btn:active { background: #575780; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 火焰安全即時監控</h1>
    
    <!-- 連線 IP 設定區 -->
    <div class="config-box">
      <label for="espIp">ESP32 IP 位址：</label>
      <input type="text" id="espIp" placeholder="例如：192.168.0.105" onchange="saveIp()">
    </div>

    <!-- 500 倍動態火焰容器 -->
    <div class="flame-container">
      <div id="flameIcon" class="flame-box flame-safe">🔥</div>
    </div>
    
    <div id="statusBadge" class="status-badge badge-safe">✅ 系統安全</div>
    
    <div class="data-card">
      <div>即時監測數值：<strong id="rawValue">----</strong> (0-4095)</div>
      <div class="bar-bg">
        <div id="valBar" class="bar-fill"></div>
      </div>
      <small style="color: #aaa; margin-top: 6px; display: block;">* 數值越小代表火焰越近/越強</small>
    </div>

    <!-- 解除警報按鈕 -->
    <button class="reset-btn" onclick="resetAlarm()">🔕 解除警報 / 誤觸復位</button>
  </div>

  <script>
    let baseUrl = '';

    window.onload = function() {
      const savedIp = localStorage.getItem('esp32_ip');
      if (savedIp) {
        document.getElementById('espIp').value = savedIp;
        baseUrl = 'http://' + savedIp;
      }
    };

    function saveIp() {
      const ip = document.getElementById('espIp').value.trim();
      localStorage.setItem('esp32_ip', ip);
      baseUrl = ip ? 'http://' + ip : '';
    }

    function updateData() {
      const url = baseUrl ? (baseUrl + '/api/data') : '/api/data';
      fetch(url)
        .then(response => response.json())
        .then(data => {
          document.getElementById('rawValue').innerText = data.raw;
          
          let intensity = Math.max(0, Math.min(100, ((4095 - data.raw) / 4095) * 100));
          document.getElementById('valBar').style.width = intensity.toFixed(0) + '%';

          const flameIcon = document.getElementById('flameIcon');
          const statusBadge = document.getElementById('statusBadge');

          // 火焰 500 倍爆發放大算式
          let scaleFactor = 0.1 + Math.pow(intensity / 100, 2) * 49.9;

          if (data.isFire || data.latched) {
            flameIcon.className = 'flame-box flame-active';
            flameIcon.style.transform = `scale(${scaleFactor.toFixed(2)})`;
            statusBadge.className = 'status-badge badge-danger';
            statusBadge.innerText = '🚨 警報！偵測到火源！';
          } else {
            flameIcon.className = 'flame-box flame-safe';
            flameIcon.style.transform = 'scale(0.1)';
            statusBadge.className = 'status-badge badge-safe';
            statusBadge.innerText = '✅ 系統安全';
          }
        })
        .catch(err => {
          // 連線重試中
        });
    }

    function resetAlarm() {
      const url = baseUrl ? (baseUrl + '/api/reset') : '/api/reset';
      fetch(url, { method: 'POST' })
        .then(() => updateData())
        .catch(err => console.error(err));
    }

    setInterval(updateData, 150);
  </script>
</body>
</html>
