<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 火焰即時監控面板 (MQTT 雲端版)</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0d0d11;
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      margin: 20px auto;
      background: #181824;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border: 1px solid #2a2a3d;
    }
    h1 { font-size: 22px; margin-bottom: 15px; color: #ff9800; }
    .conn-status {
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 12px;
      background: #333;
      display: inline-block;
      margin-bottom: 15px;
    }
    .flame-container {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 15px 0;
      border-radius: 12px;
      background: #09090d;
    }
    .flame-box {
      font-size: 16px;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: center center;
    }
    .flame-safe {
      filter: grayscale(100%);
      opacity: 0.2;
      transform: scale(0.1) !important;
    }
    .flame-active {
      filter: drop-shadow(0 0 25px #ff3d00);
      animation: burn 0.2s infinite alternate ease-in-out;
    }
    @keyframes burn {
      0% { transform: rotate(-5deg); }
      100% { transform: rotate(5deg); }
    }
    .status-badge {
      font-size: 18px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 25px;
      display: inline-block;
      margin-bottom: 15px;
    }
    .badge-safe { background: #1b5e20; color: #81c784; }
    .badge-danger { background: #c62828; color: #ffffff; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .data-card {
      background: #222233;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
      text-align: left;
    }
    .bar-bg { background: #333; height: 14px; border-radius: 7px; overflow: hidden; margin-top: 8px; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #ff9800, #f44336); transition: width 0.15s ease; }
    .reset-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background: #c62828;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .reset-btn:active { background: #b71c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 火焰安全即時監控 (雲端版)</h1>
    <div id="connStatus" class="conn-status">📡 正在連線至雲端 Broker...</div>

    <div class="flame-container">
      <div id="flameIcon" class="flame-box flame-safe">🔥</div>
    </div>
    
    <div id="statusBadge" class="status-badge badge-safe">✅ 系統安全</div>
    
    <div class="data-card">
      <div>即時監測數值：<strong id="rawValue">----</strong> (0-4095)</div>
      <div class="bar-bg">
        <div id="valBar" class="bar-fill"></div>
      </div>
      <small style="color: #aaa; margin-top: 6px; display: block;">* 數值越小代表火焰越近</small>
    </div>

    <button class="reset-btn" onclick="resetAlarm()">🔕 解除警報 / 誤觸復位</button>
  </div>

  <script>
    // 連接至公共 MQTT Broker (WebSocket 連接埠 8000)
    const client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt');

    const TOPIC_DATA = 'esp32/flame/data_7a44';
    const TOPIC_CMD  = 'esp32/flame/cmd_7a44';

    client.on('connect', () => {
      document.getElementById('connStatus').innerText = '🟢 雲端已連線';
      document.getElementById('connStatus').style.background = '#1b5e20';
      client.subscribe(TOPIC_DATA);
    });

    client.on('offline', () => {
      document.getElementById('connStatus').innerText = '🔴 雲端連線中斷';
      document.getElementById('connStatus').style.background = '#c62828';
    });

    client.on('message', (topic, message) => {
      if (topic === TOPIC_DATA) {
        const data = JSON.parse(message.toString());
        document.getElementById('rawValue').innerText = data.raw;
        
        let intensity = Math.max(0, Math.min(100, ((4095 - data.raw) / 4095) * 100));
        document.getElementById('valBar').style.width = intensity.toFixed(0) + '%';

        const flameIcon = document.getElementById('flameIcon');
        const statusBadge = document.getElementById('statusBadge');

        // 動態放大 500 倍算式
        let scaleFactor = 0.1 + Math.pow(intensity / 100, 2) * 49.9;

        if (data.isFire || data.latched) {
          flameIcon.className = 'flame-box flame-active';
          flameIcon.style.transform = `scale(${scaleFactor.toFixed(2)})`;
          statusBadge.className = 'status-badge badge-danger';
          statusBadge.innerText = '🚨 警報！偵測到火源！';
        } else {
          flameIcon.className = 'flame-box flame-safe';
          flameIcon.style.transform = 'scale(0.1)';
          statusBadge.className = 'status-badge badge-safe';
          statusBadge.innerText = '✅ 系統安全';
        }
      }
    });

    function resetAlarm() {
      client.publish(TOPIC_CMD, 'RESET');
    }
  </script>
</body>
</html>
