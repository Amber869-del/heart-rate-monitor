<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 火焰即時動態監控</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0d0d11;
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      margin: 20px auto;
      background: #181824;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border: 1px solid #2a2a3d;
    }
    h1 { font-size: 22px; margin-bottom: 15px; color: #ff9800; }
    .conn-status {
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 12px;
      background: #c62828;
      display: inline-block;
      margin-bottom: 15px;
    }
    .flame-container {
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 15px 0;
      border-radius: 12px;
      background: #050508;
      position: relative;
    }
    .flame-box {
      font-size: 50px;
      transition: transform 0.15s cubic-bezier(0.1, 0.8, 0.3, 1), filter 0.15s ease;
      transform-origin: center center;
      user-select: none;
    }
    .flame-safe {
      filter: grayscale(90%);
      opacity: 0.2;
      transform: scale(0.3);
    }
    .flame-active {
      filter: drop-shadow(0 0 35px #ff1100) drop-shadow(0 0 60px #ff9800);
      animation: burn 0.12s infinite alternate ease-in-out;
    }
    @keyframes burn {
      0% { transform: scale(var(--flame-scale, 1)) rotate(-8deg); }
      100% { transform: scale(calc(var(--flame-scale, 1) * 1.15)) rotate(8deg); }
    }
    .status-badge {
      font-size: 18px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 25px;
      display: inline-block;
      margin-bottom: 15px;
    }
    .badge-safe { background: #1b5e20; color: #81c784; }
    .badge-danger { background: #c62828; color: #ffffff; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .data-card {
      background: #222233;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
      text-align: left;
    }
    .bar-bg { background: #333; height: 14px; border-radius: 7px; overflow: hidden; margin-top: 8px; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #ff9800, #f44336); transition: width 0.15s ease; }
    .reset-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background: #d32f2f;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .reset-btn:active { background: #9a0007; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 火焰即時動態監控</h1>
    <div id="connStatus" class="conn-status">🔴 雲端連線中...</div>

    <div class="flame-container">
      <div id="flameIcon" class="flame-box flame-safe">🔥</div>
    </div>
    
    <div id="statusBadge" class="status-badge badge-safe">✅ 系統安全</div>
    
    <div class="data-card">
      <div>即時監測數值：<strong id="rawValue">----</strong> (0-4095)</div>
      <div class="bar-bg">
        <div id="valBar" class="bar-fill"></div>
      </div>
      <small style="color: #888; display: block; margin-top: 6px;">* 火源越近，數值越低，火焰越巨大</small>
    </div>

    <button class="reset-btn" onclick="resetAlarm()">🔕 解除警報 / 誤觸復位</button>
  </div>

  <script>
    const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

    const TOPIC_DATA = 'esp32/flame/data_7a44';
    const TOPIC_CMD  = 'esp32/flame/cmd_7a44';

    client.on('connect', () => {
      const statusEl = document.getElementById('connStatus');
      statusEl.innerText = '🟢 雲端已連線';
      statusEl.style.background = '#1b5e20';
      client.subscribe(TOPIC_DATA);
    });

    client.on('offline', () => {
      const statusEl = document.getElementById('connStatus');
      statusEl.innerText = '🔴 雲端連線中斷';
      statusEl.style.background = '#c62828';
    });

    client.on('message', (topic, message) => {
      if (topic === TOPIC_DATA) {
        try {
          const data = JSON.parse(message.toString());
          document.getElementById('rawValue').innerText = data.raw;
          
          // 計算強度 (0% ~ 100%)
          let intensity = Math.max(0, Math.min(100, ((4095 - data.raw) / 4095) * 100));
          document.getElementById('valBar').style.width = intensity.toFixed(0) + '%';

          const flameIcon = document.getElementById('flameIcon');
          const statusBadge = document.getElementById('statusBadge');

          // 計算火焰縮放倍率：遠處最小 0.3 倍，極近時爆發放大到 3.5 倍！
          let scaleMultiplier = 0.3 + Math.pow(intensity / 100, 1.5) * 3.2;
          flameIcon.style.setProperty('--flame-scale', scaleMultiplier.toFixed(2));

          if (data.isFire || data.latched) {
            flameIcon.className = 'flame-box flame-active';
            statusBadge.className = 'status-badge badge-danger';
            statusBadge.innerText = '🚨 警報！偵測到火源！';
          } else {
            flameIcon.className = 'flame-box flame-safe';
            statusBadge.className = 'status-badge badge-safe';
            statusBadge.innerText = '✅ 系統安全';
          }
        } catch(e) {
          console.error(e);
        }
      }
    });

    function resetAlarm() {
      if (client.connected) {
        client.publish(TOPIC_CMD, 'RESET');
      } else {
        alert('雲端未連線，請確認 ESP32 是否已開機！');
      }
    }
  </script>
</body>
</html>
